#
# OpenOCD configuration file for the RP2350
#
source [find interface/cmsis-dap.cfg]
adapter speed 10000
source [find target/rp2350.cfg]

rp2350.cm0 cortex_m reset_config sysresetreq
rp2350.cm1 cortex_m reset_config sysresetreq

# Control the CMSIS-DAP 'running' LED
# (openocd does not care about this at all)
$_TARGETNAME_0 configure -event halted  {
    debug_level -1
    cmsis-dap cmd 0x01 0x01 0x00
    debug_level 2
}
$_TARGETNAME_0 configure -event resumed {
    debug_level -1
    cmsis-dap cmd 0x01 0x01 0x01
    debug_level 2
}
$_TARGETNAME_1 configure -event halted  {
    debug_level -1
    cmsis-dap cmd 0x01 0x01 0x00
    debug_level 2
}
$_TARGETNAME_1 configure -event resumed {
    debug_level -1
    cmsis-dap cmd 0x01 0x01 0x01
    debug_level 2
}

